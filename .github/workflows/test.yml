# Apache License 2.0

name: Test

on:
  workflow_call:
    inputs:
      project_name:
        description: The name of the project.
        required: true
        type: string
      project_version:
        description: The version of the project.
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  DOCKER_REGISTRY_PATH: openspacecollective
  LANG: en_US.UTF-8

jobs:
  format-check-cpp:
    name: Check C++ Format
    runs-on: ubuntu-24.04
    container:
      image: openspacecollective/${{ inputs.project_name }}-development:${{ inputs.project_version }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check C++ Format
        run: ostk-check-format-cpp

  format-check-python:
    name: Check Python Format
    runs-on: ubuntu-24.04
    container:
      image: openspacecollective/${{ inputs.project_name }}-development:${{ inputs.project_version }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check Python Format
        run: ostk-check-format-python

  test:
    name: Build and Test
    runs-on: ubuntu-24.04
    container:
      image: openspacecollective/${{ inputs.project_name }}-development:${{ inputs.project_version }}
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Build
        run: cd /app && make _build-test
      - name: Run C++ Unit Tests
        run: cd /app/build && make coverage
      - name: Upload Coverage Results
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: /app/build/coverage.info
          fail_ci_if_error: true
      - name: Run Python Unit Tests
        run: |
          for version in $(ls /app/build/bindings/python/ | grep -oE '[0-9]+\.[0-9]+$' | sort -u); do
            OSTK_PYTHON_VERSION=${version} ostk-test-python
          done
